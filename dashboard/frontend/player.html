<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ThirdUmpire — Player Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B1120;
    --surface: #131B2E;
    --surface-hover: #1B2540;
    --hairline: #26314D;
    --text: #E7EAF3;
    --text-dim: #8A93AC;
    --floodlight: #F5D46A;
    --turf: #4F8F63;
    --ball-red: #C1443C;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  .glow-bar {
    height: 3px;
    width: 100%;
    background: linear-gradient(90deg, transparent, var(--floodlight), transparent);
    opacity: 0.7;
  }

  header {
    padding: 32px 24px 8px;
    max-width: 900px;
    margin: 0 auto;
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 28px;
    margin: 0 0 4px;
    letter-spacing: -0.02em;
  }

  .subtitle { color: var(--text-dim); font-size: 14px; margin: 0 0 12px; }

  nav a {
    color: var(--text-dim);
    font-size: 13px;
    text-decoration: none;
    margin-right: 16px;
    border-bottom: 1px solid transparent;
  }
  nav a.active { color: var(--floodlight); border-bottom-color: var(--floodlight); }
  nav a:hover { color: var(--text); }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 24px 60px;
  }

  .search-box {
    position: relative;
    margin-bottom: 24px;
  }

  #searchInput {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--hairline);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    padding: 12px 16px;
    border-radius: 8px;
  }
  #searchInput:focus-visible {
    outline: 2px solid var(--floodlight);
    outline-offset: 2px;
  }

  .suggestions {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 8px;
    overflow: hidden;
    z-index: 10;
    max-height: 280px;
    overflow-y: auto;
  }
  .suggestion-item {
    padding: 10px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--hairline);
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--surface-hover); }
  .suggestion-name { font-size: 14px; }
  .suggestion-meta { font-size: 11px; color: var(--text-dim); text-transform: capitalize; }

  .placeholder, .error {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }
  .error { color: var(--ball-red); }

  .profile-card {
    border: 1px solid var(--hairline);
    border-radius: 10px;
    background: var(--surface);
    padding: 24px;
  }

  .profile-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--hairline);
  }
  .profile-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
  }
  .profile-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .tag {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    background: var(--surface-hover);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .stat-section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--floodlight);
    margin: 20px 0 12px;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
  }
  .stat-tile {
    background: var(--bg);
    border: 1px solid var(--hairline);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .stat-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 600;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .no-data {
    color: var(--text-dim);
    font-size: 13px;
    font-style: italic;
  }

  @media (max-width: 600px) {
    .profile-header { flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>

<div class="glow-bar"></div>

<header>
  <h1>Player Stats</h1>
  <p class="subtitle">Search any PSL player for their full career numbers</p>
  <nav>
    <a href="index.html">Match Ledger</a>
    <a href="player.html" class="active">Player Stats</a>
    <a href="compare.html">Compare</a>
  </nav>
</header>

<main>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search a player name (e.g. Babar Azam)…" autocomplete="off" />
    <div class="suggestions" id="suggestions" style="display:none;"></div>
  </div>

  <div id="result">
    <div class="placeholder">Search for a player above to see their career numbers.</div>
  </div>
</main>

<script>
  const API_BASE = "http://127.0.0.1:8000/api";
  const searchInput = document.getElementById("searchInput");
  const suggestions = document.getElementById("suggestions");
  const result = document.getElementById("result");

  let debounceTimer = null;

  searchInput.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    const q = searchInput.value.trim();
    if (q.length < 2) {
      suggestions.style.display = "none";
      return;
    }
    debounceTimer = setTimeout(() => runSearch(q), 250);
  });

  document.addEventListener("click", (e) => {
    if (!e.target.closest(".search-box")) suggestions.style.display = "none";
  });

  async function runSearch(q) {
    try {
      const res = await fetch(`${API_BASE}/players/search?q=${encodeURIComponent(q)}`);
      const players = await res.json();
      if (!players.length) {
        suggestions.innerHTML = `<div class="suggestion-item"><span class="suggestion-meta">No matches</span></div>`;
        suggestions.style.display = "block";
        return;
      }
      suggestions.innerHTML = players.map(p => `
        <div class="suggestion-item" data-id="${p.player_id}">
          <span class="suggestion-name">${p.display_name || p.full_name}</span>
          <span class="suggestion-meta">${p.primary_role || ""}${p.nationality ? " · " + p.nationality : ""}</span>
        </div>
      `).join("");
      suggestions.style.display = "block";

      suggestions.querySelectorAll(".suggestion-item[data-id]").forEach(el => {
        el.addEventListener("click", () => {
          searchInput.value = el.querySelector(".suggestion-name").textContent;
          suggestions.style.display = "none";
          loadPlayer(el.dataset.id);
        });
      });
    } catch (e) {
      console.error(e);
    }
  }

  function tile(value, label) {
    return `
      <div class="stat-tile">
        <div class="stat-value">${value === null || value === undefined ? "—" : value}</div>
        <div class="stat-label">${label}</div>
      </div>
    `;
  }

  async function loadPlayer(playerId) {
    result.innerHTML = `<div class="placeholder">Loading…</div>`;
    try {
      const res = await fetch(`${API_BASE}/players/${playerId}`);
      if (!res.ok) throw new Error(`API returned ${res.status}`);
      const data = await res.json();
      if (data.error) {
        result.innerHTML = `<div class="error">${data.error}</div>`;
        return;
      }
      renderProfile(data);
    } catch (e) {
      result.innerHTML = `<div class="error">Couldn't reach the API — make sure the backend is running on port 8000.</div>`;
      console.error(e);
    }
  }

  function renderProfile(data) {
    const p = data.player;
    const b = data.batting;
    const bw = data.bowling;

    const tags = [p.primary_role, p.nationality, p.batting_hand ? `${p.batting_hand}-hand bat` : null,
                  p.bowler_type && p.bowler_type !== 'na' ? p.bowling_subtype || p.bowler_type : null]
                  .filter(Boolean);

    const hasBatted = b.innings > 0;
    const hasBowled = bw.innings > 0;

    result.innerHTML = `
      <div class="profile-card">
        <div class="profile-header">
          <div>
            <div class="profile-name">${p.display_name || p.full_name}</div>
            <div class="profile-tags">${tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
          </div>
        </div>

        <div class="stat-section-title">Batting</div>
        ${hasBatted ? `
          <div class="stat-grid">
            ${tile(b.innings, "Innings")}
            ${tile(b.runs, "Runs")}
            ${tile(b.highest_score, "Highest")}
            ${tile(b.average, "Average")}
            ${tile(b.strike_rate, "Strike rate")}
            ${tile(b.fifties, "50s")}
            ${tile(b.hundreds, "100s")}
            ${tile(b.fours, "4s")}
            ${tile(b.sixes, "6s")}
          </div>
        ` : `<div class="no-data">No batting record in the database.</div>`}

        <div class="stat-section-title">Bowling</div>
        ${hasBowled ? `
          <div class="stat-grid">
            ${tile(bw.innings, "Innings")}
            ${tile(bw.overs, "Overs")}
            ${tile(bw.wickets, "Wickets")}
            ${tile(bw.best_figures, "Best figures")}
            ${tile(bw.average, "Average")}
            ${tile(bw.economy, "Economy")}
            ${tile(bw.maidens, "Maidens")}
            ${tile(bw.four_wicket_hauls, "4W hauls")}
            ${tile(bw.five_wicket_hauls, "5W hauls")}
          </div>
        ` : `<div class="no-data">No bowling record in the database.</div>`}
      </div>
    `;
  }
</script>

</body>
</html>
